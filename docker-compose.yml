services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_sitemark
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_DB: ${DB_DATABASE:-sitemark}
    volumes:
      - database:/var/lib/postgresql/data

volumes:
  database:
